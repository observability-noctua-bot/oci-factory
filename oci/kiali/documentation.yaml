version: 2
application: kiali
description: >
  Kiali is a management console for Istio service mesh. It provides observability,
  monitoring, and troubleshooting capabilities for Istio-based microservices.
website: https://github.com/kiali/kiali
issues: https://github.com/canonical/kiali-rock
source-code: https://github.com/canonical/kiali-rock

docker:
  parameters: >-
    -e TZ=UTC
    -p 20001:20001
  run_conclusion: |
    Access the Kiali UI at `http://localhost:20001`.

config:
  TZ:
    type: env
    description: Timezone setting for the container.
  '`-p <port>:20001`':
    type: port
    description: Exposes the container's port `20001` on the host's `<port>`.
