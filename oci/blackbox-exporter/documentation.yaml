version: 2
application: blackbox-exporter
description: |
  Blackbox exporter is a Prometheus exporter that allows to perform blackbox
  probes using a multitude of protocols, including HTTP(s), DNS, TCP and ICMP.
website: https://github.com/prometheus/blackbox_exporter
issues: https://github.com/canonical/blackbox-exporter-rock/issues
source-code: https://github.com/canonical/blackbox-exporter-rock

docker:
  parameters: >-
    -p 9115:9115
  run_conclusion: |
    Blackbox Exporter starts on port 9115.
    Access the Blackbox Exporter instance at `http://localhost:9115`.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-v <path>:/etc/blackbox_exporter/config.yml`':
    type: mount
    description: Local configuration file `config.yaml`. 
  '`-p <port>:9115`':
    type: port
    description: Expose port 9115 on the host.
