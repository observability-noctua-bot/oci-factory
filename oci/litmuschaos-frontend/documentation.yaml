version: 2

application: litmuschaos-frontend
description: |
  Litmuschaos-frontend is a component of the LitmusChaos solution, an open source
  platform used for chaos testing. It provides the web user interface for
  interacting with Litmus ChaosCenter services.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus).
website: https://litmuschaos.io/
issues: https://github.com/canonical/litmuschaos-frontend-rock/issues
source-code: https://github.com/canonical/litmuschaos-frontend-rock

docker:
  parameters: >-
    -p 8185:8185
  run_conclusion: |
    Access the frontend server at `http://localhost:8185`.

config:
  '`-p <port>:8185`':
    type: port
    description: Expose the frontend on localhost:8185.
