version: 2

application: litmuschaos-server
description: |
  Litmuschaos is a chaos testing platform for kubernetes applications. It allows you to define,
  run and monitor 'chaos experiments' that simulate infrastructure failures to verify the stability
  of your applications. Read more on the [official documentation](https://litmuschaos.io/).
  
  This rock deploys the backend component, also known as the 'graphql server'.
website: https://litmuschaos.io/
issues: https://github.com/canonical/litmuschaos-server-rock/issues
source-code: https://github.com/canonical/litmuschaos-server-rock

docker:
  run_cmd: -d
  parameters: >-
    -p 3000:3000
  run_conclusion: |
    Before starting, ensure a MongoDB instance is running and set `DB_SERVER`, `DB_USER`, and
    `DB_PASSWORD` to point to it (e.g. `docker run -d -e MONGO_INITDB_ROOT_USERNAME=root -e MONGO_INITDB_ROOT_PASSWORD=password -p 27017:27017 mongo:7`).

    Access the LitmusChaos server at `http://localhost:3000`.

    Note that at this point the workload still won't be operational, as it requires the
    litmuschaos-auth and litmuschaos-frontend components to function.

config:
  VERSION:
    type: env
    description: ID of the running version.
  INFRA_DEPLOYMENTS:
    type: env
    description: Deployment names for the infra components, e.g., `["app=chaos-exporter"]`.
  SUBSCRIBER_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the subscriber service, e.g., `litmuschaos/litmusportal-subscriber:ci`.
  EVENT_TRACKER_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the event-tracker service, e.g., `litmuschaos/litmusportal-event-tracker:ci`.
  ARGO_WORKFLOW_CONTROLLER_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the argo-workflow-controller service, e.g., `litmuschaos/workflow-controller:v3.3.1`.
  ARGO_WORKFLOW_EXECUTOR_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the argo-workflow-executor service, e.g., `litmuschaos/argoexec:v3.3.1`.
  LITMUS_CHAOS_OPERATOR_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the chaos-operator service, e.g., `litmuschaos/chaos-operator:ci`.
  LITMUS_CHAOS_RUNNER_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the chaos-runner service, e.g., `litmuschaos/chaos-runner:ci`.
  LITMUS_CHAOS_EXPORTER_IMAGE:
    type: env
    description: Image the chaoscenter uses to deploy the chaos-exporter service, e.g., `litmuschaos/chaos-exporter:ci`.
  CONTAINER_RUNTIME_EXECUTOR:
    type: env
    description: Runtime executor, e.g., `k8sapi`.
  WORKFLOW_HELPER_IMAGE_VERSION:
    type: env
    description: Image version tag for the workflow helper, e.g., `ci`.
  INFRA_COMPATIBLE_VERSIONS:
    type: env
    description: Image version tag for the infra workloads, e.g., `ci`.
  DEFAULT_HUB_BRANCH_NAME:
    type: env
    description: Default branch name for GitOps repositories, e.g., `master`.
  ADMIN_USERNAME:
    type: env
    description: Web UI admin username.
  ADMIN_PASSWORD:
    type: env
    description: Web UI admin password.
  DB_SERVER:
    type: env
    description: Database server address.
  DB_USER:
    type: env
    description: Database username.
  DB_PASSWORD:
    type: env
    description: Database password.
  REST_PORT:
    type: env
    description: REST API auth server port, e.g., `3000`.
  GRPC_PORT:
    type: env
    description: gRPC auth server port, e.g., `3030`.
  '`-p <port>:3000`':
    type: port
    description: >-
      Expose the container's port 3000 on the host's `<port>`.
      Replace port 3000 if any other port is passed to the environmental
      variable `REST_PORT`.
  '`-p <port>:3030`':
    type: port
    description: >-
      Expose the container's port 3030 on the host's `<port>`.
      Replace port 3030 if any other port is passed to the environmental
      variable `GRPC_PORT`.
