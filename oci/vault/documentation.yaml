version: 2
application: vault
description: |
  [HashiCorp Vault](https://www.vaultproject.io/) is an encryption-as-a-service tool
  for secrets and privileged access management.

  Vault enables you to secure, store, and tightly control access to tokens, passwords,
  certificates, encryption keys, and other sensitive data using a UI, CLI, or HTTP API.
website: https://www.vaultproject.io/
issues: https://github.com/canonical/vault-rock/issues
source-code: https://github.com/canonical/vault-rock

docker:
  parameters: >-
    -p 8200:8200
  run_conclusion: |
    Access the Vault UI at `http://localhost:8200`.

config:
  '`-v <path>:/vault/config/config.hcl`':
    type: mount
    description: Mount a custom Vault configuration file.
  '`-p <port>:8200`':
    type: port
    description: Expose the container's port `8200` for Vault UI and API on the host's `<port>`.
  '`--args vault -- -config=<path> \;`':
    type: app
    description: Start the Vault server with the specified configuration file.
