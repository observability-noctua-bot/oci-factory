version: 2

application: PHP
description: |
  PHP is a general-purpose scripting language well-suited for Web
  development. Fast, flexible and pragmatic, PHP powers everything
  from your blog to the most popular websites in the world.

website: https://www.php.net/
issues: https://github.com/canonical/php-rock/issues
source-code: https://github.com/canonical/php-rock

docker:
  run_cmd: exec php <args>
  run_conclusion: |
    PHP will execute any given instruction, for example running php code from input:

    ```bash
    docker run --rm ubuntu/php:8.3-24.04_edge exec php -r "echo 'hello, world! In PHP!';"
    ```

    Or setting up a php server for development purposes:

    ```bash
    docker run -d --rm --name php-container -p 8080:8080 -v /my-app:/app ubuntu/php:8.3-24.04_edge exec php -S 0.0.0.0:8080 -t /app
    ```

    A list of all the available options can be queried by running the image with the `-h` switch.

override_tracks:
  # Tracks with different tag than build-base
  8.4-25.04:
    end-of-life: '2026-01-15T00:00:00Z'
