version: 2
application: pilot
description: |
  pilot is the Istio Pilot Discovery service that provides mesh-wide traffic management,
  security, and policy capabilities for the Istio Service Mesh.
website: https://istio.io
issues: https://github.com/canonical/istio-pilot-rock/issues
source-code: https://github.com/canonical/istio-pilot-rock

docker:
  parameters: >-
    -e TZ=UTC
    -p 8080:8080
    -p 15017:15017
    -p 15010:15010
    -p 15012:15012
    -p 15014:15014
  run_conclusion: |
    Pilot Discovery starts and exposes service endpoints.
    Access the service locally at:
    - HTTP: http://localhost:8080
    - HTTPS (injection/validation): https://localhost:15017
    - gRPC (insecure): localhost:15010
    - gRPC (secure): localhost:15012
    - Monitoring: http://localhost:15014

config:
  TZ:
    type: env
    description: Set container timezone.
    default: 'UTC'
  '`pilot-discovery discovery`':
    type: other
    description: Launch the Istio Pilot Discovery service with default values.
  '`--caCertFile <path>`':
    type: other
    description: File containing the x509 Server CA Certificate.
  '`--clusterAliases <key1=value1,key2=value2>`':
    type: other
    description: Alias names for clusters, provided as comma-separated key=value pairs.
    default: '[]'
  '`--clusterID <cluster-id>`':
    type: other
    description: The ID of the cluster that this Istiod instance resides in.
    default: Kubernetes
  '`--clusterRegistriesNamespace <namespace>`':
    type: other
    description: Namespace for the ConfigMap that stores cluster configurations.
    default: istio-system
  '`--cniNamespace <namespace>`':
    type: other
    description: Namespace where the istio-cni resides. Uses POD_NAMESPACE if not set.
    default: istio-system
  '`--configDir <path>`':
    type: other
    description: Directory to watch for updates to config YAML files, used as the config source instead of a CRD client.
  '`--ctrlz_address <address>`':
    type: other
    description: IP address for the ControlZ introspection facility; use '*' for all addresses.
    default: localhost
  '`--ctrlz_port <port>`':
    type: other
    description: Port for the ControlZ introspection facility.
    default: '9876'
  '`--domain <domain>`':
    type: other
    description: DNS domain suffix for the service mesh.
    default: cluster.local
  '`--grpcAddr <address>`':
    type: other
    description: gRPC address for the discovery service.
    default: ':15010'
  '`--httpAddr <address>`':
    type: other
    description: HTTP address for the discovery service.
    default: ':8080'
  '`--httpsAddr <address>`':
    type: other
    description: HTTPS address for the injection and validation service.
    default: ':15017'
  '`--keepaliveInterval <duration>`':
    type: other
    description: Interval with no activity after which a keepalive ping is sent.
    default: 30s
  '`--keepaliveMaxServerConnectionAge <duration>`':
    type: other
    description: Maximum duration a connection is kept open on the server before a graceful close.
    default: 2562047h47m16.854775807s
  '`--keepaliveTimeout <duration>`':
    type: other
    description: Duration to wait after a keepalive ping before closing the connection if no activity is detected.
    default: 10s
  '`--kubeconfig <path>`':
    type: other
    description: Path to a Kubernetes configuration file for out-of-cluster access.
  '`--kubernetesApiBurst <int>`':
    type: other
    description: Maximum burst for throttling when communicating with the Kubernetes API.
    default: '160'
  '`--kubernetesApiQPS <int>`':
    type: other
    description: Maximum QPS when communicating with the Kubernetes API.
    default: '80'
  '`--log_as_json`':
    type: other
    description: Format log output as JSON instead of plain text.
    default: 'false'
  '`--log_caller <scopes>`':
    type: other
    description: List of scopes for which to include caller information in logs.
  '`--log_output_level <scope:level>`':
    type: other
    description: Minimum logging level per scope for output, in the format <scope>:<level>.
  '`--log_stacktrace_level <scope:level>`':
    type: other
    description: Minimum logging level per scope at which stack traces are captured.
    default: default:none
  '`--log_target <targets>`':
    type: other
    description: Paths where log output is sent (for example stdout, stderr, or file paths).
    default: '[stdout]'
  '`--meshConfig <path>`':
    type: other
    description: File name for the Istio mesh configuration.
    default: ./etc/istio/config/mesh
  '`--monitoringAddr <address>`':
    type: other
    description: HTTP address for Pilot self-monitoring information.
    default: ':15014'
  '`--namespace <namespace>`':
    type: other
    description: Namespace where the controller resides; defaults to POD_NAMESPACE if not set.
    default: istio-system
  '`--networksConfig <path>`':
    type: other
    description: File name for the Istio mesh networks configuration.
    default: ./etc/istio/config/meshNetworks
  '`--profile`':
    type: other
    description: Enable profiling via the web interface at /debug/pprof.
    default: 'true'
  '`--registries <registries>`':
    type: other
    description: Comma separated list of service registries to read from.
    default: '[Kubernetes]'
  '`--secureGRPCAddr <address>`':
    type: other
    description: Secured gRPC address for the discovery service.
    default: ':15012'
  '`--shutdownDuration <duration>`':
    type: other
    description: Duration the discovery server needs to terminate gracefully.
    default: 10s
  '`--tls-cipher-suites <suites>`':
    type: other
    description: Comma-separated list of TLS cipher suites for the istiod TLS server. If omitted, default Go cipher suites are used.
  '`--tlsCertFile <path>`':
    type: other
    description: File containing the x509 Server Certificate.
  '`--tlsKeyFile <path>`':
    type: other
    description: File containing the x509 private key matching --tlsCertFile.
  '`--vklog <level>`':
    type: other
    description: Global log verbosity level (similar to the -v flag).
