version: 2
application: apache2
description: |
  The Apache HTTP Server Project's goal is to build a secure, efficient, and extensible
  HTTP server as standards-compliant open source software. The result has long been the
  number one web server on the Internet.
website: https://httpd.apache.org/
issues: https://github.com/canonical/apache2-rock/issues
source-code: https://github.com/canonical/apache2-rock

docker:
  parameters: >-
    -p 8080:80
  run_conclusion: |
    Apache2 starts and serves HTTP traffic on port 80.
    Access the Apache2 server at `http://localhost:8080`.

config:
  '`-p <port>:80`':
    type: port
    description: Expose port 80 on the host.
  '`-v <path>:/var/www/html:ro`':
    type: mount
    description: Mount and serve a local website.
  '`-v <path>:/etc/apache2/apache2.conf:ro`':
    type: mount
    description: Local [configuration file](https://httpd.apache.org/docs/2.4) `apache2.conf` (try [this example](https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/apache2/plain/examples/config/apache2.conf?h=2.4-22.04))
microk8s:
  deploy:
    link: https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/apache2/plain/examples/apache2-deployment.yml?h=2.4-22.04
    access: |
      You will now be able to connect to the apache2 server on `http://localhost:30080`.
  configmap:
    files:
      - key: apache2
        name: apache2.conf
        link: https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/apache2/plain/examples/config/apache2.conf?h=2.4-22.04
      - key: apache2-site
        name: index.html
        link: https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/apache2/plain/examples/config/html/index.html?h=2.4-22.04

